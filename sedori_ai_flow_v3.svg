<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f6f7fa; }
      .title { font: 700 38px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 18px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #5d6878; }
      .section { font: 700 20px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #1b2536; }
      .body { font: 600 15px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #253146; }
      .small { font: 500 12px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #596579; }
      .tiny { font: 500 10.5px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #657184; }
      .card { fill: #ffffff; stroke: #dfe5ed; stroke-width: 1.4; }
      .soft { fill: #f0f4f8; stroke: #cbd5e1; }
      .blue { fill: #2563eb; }
      .green { fill: #0f9f6e; }
      .orange { fill: #d97706; }
      .red { fill: #dc2626; }
      .purple { fill: #7c3aed; }
      .apiFree { fill: #e8f5ef; stroke: #89c8ab; }
      .apiPaid { fill: #fff2df; stroke: #ddb16f; }
      .apiMixed { fill: #eef2ff; stroke: #9aa9e8; }
      .risk { fill: #fff1f2; stroke: #ef9aa7; }
      .line { stroke: #9aa7b8; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .badgeText { font: 700 11px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #ffffff; }
      .tagText { font: 700 10.5px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #233044; }
      .num { font: 700 15px Arial, sans-serif; fill: #ffffff; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d283a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect x="42" y="30" width="1516" height="838" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="42" y="30" width="1516" height="838" rx="22" fill="#ffffff" stroke="#e6ebf1" stroke-width="1.5"/>

  <text x="78" y="86" class="title">せどりAIシステム：仕入れ・在庫・販売・会計の業務フロー</text>
  <text x="80" y="121" class="subtitle">API費用の目安を入れた全体設計。Amazon/楽天/Yahooなどの取得元、在庫マスター、会計連携までを一気通貫で管理する。</text>

  <g transform="translate(78 154)">
    <rect x="0" y="0" width="1444" height="58" rx="15" fill="#f3f6fa" stroke="#dce2ea"/>
    <text class="section" x="22" y="36">凡例</text>
    <rect class="apiFree" x="112" y="15" width="102" height="28" rx="14"/>
    <text class="tagText" x="137" y="34">無料API</text>
    <rect class="apiPaid" x="230" y="15" width="116" height="28" rx="14"/>
    <text class="tagText" x="252" y="34">有料API</text>
    <rect class="apiMixed" x="362" y="15" width="142" height="28" rx="14"/>
    <text class="tagText" x="383" y="34">プラン/条件あり</text>
    <rect class="soft" x="520" y="15" width="112" height="28" rx="14"/>
    <text class="tagText" x="542" y="34">CSV/手動</text>
    <rect class="risk" x="648" y="15" width="136" height="28" rx="14"/>
    <text class="tagText" x="668" y="34">規約注意</text>
    <text class="small" x="818" y="34">€は1€=約184円換算。2026年5月時点の目安、必ず公式料金を再確認。</text>
  </g>

  <g transform="translate(78 238)">
    <rect class="card" x="0" y="0" width="230" height="392" rx="16"/>
    <circle class="blue" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">1</text>
    <text class="section" x="54" y="39">仕入れ先</text>
    <text class="small" x="18" y="66">安く買える候補を集める</text>

    <rect class="apiFree" x="16" y="88" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="109">楽天市場</text>
    <text class="tiny" x="30" y="123">楽天API: 0円/月</text>

    <rect class="apiFree" x="16" y="136" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="157">Yahoo!ショッピング</text>
    <text class="tiny" x="30" y="171">商品検索API: 0円/月</text>

    <rect class="apiMixed" x="16" y="184" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="205">Amazon.co.jp</text>
    <text class="tiny" x="30" y="219">SP-API: 大口4,900円/月+税</text>

    <rect class="risk" x="16" y="232" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="253">メルカリ</text>
    <text class="tiny" x="30" y="267">CSV/手動推奨・自動取得注意</text>

    <rect class="apiMixed" x="16" y="280" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="301">ヤフオク / eBay</text>
    <text class="tiny" x="30" y="315">API/CSV併用、eBay API 0円</text>

    <rect class="soft" x="16" y="328" width="198" height="40" rx="10"/>
    <text class="body" x="30" y="349">店舗仕入れ</text>
    <text class="tiny" x="30" y="363">JAN読取・レシートOCR</text>
  </g>

  <g transform="translate(332 238)">
    <rect class="card" x="0" y="0" width="230" height="392" rx="16"/>
    <circle class="blue" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">2</text>
    <text class="section" x="54" y="39">市場データ</text>
    <text class="small" x="18" y="66">売れるか・競合が強いか</text>

    <rect class="apiMixed" x="16" y="88" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="109">Amazon SP-API</text>
    <text class="tiny" x="30" y="124">価格・競合・注文・入金</text>

    <rect class="apiPaid" x="16" y="150" width="198" height="54" rx="10"/>
    <text class="body" x="30" y="171">Keepa API</text>
    <text class="tiny" x="30" y="186">€49/月〜 約9,000円〜</text>
    <text class="tiny" x="30" y="199">価格/ランキング推移</text>

    <rect class="apiFree" x="16" y="216" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="237">楽天/Yahoo API</text>
    <text class="tiny" x="30" y="252">価格・送料・在庫有無</text>

    <rect class="soft" x="16" y="278" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="299">相場補完</text>
    <text class="tiny" x="30" y="314">CSV/手動/外部ツール</text>

    <text class="tiny" x="18" y="360">現在値は公式API、履歴はKeepaで補強。</text>
  </g>

  <g transform="translate(586 238)">
    <rect class="card" x="0" y="0" width="230" height="392" rx="16"/>
    <circle class="green" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">3</text>
    <text class="section" x="54" y="39">AI仕入れ判定</text>
    <text class="small" x="18" y="66">利益・需要・リスクを点数化</text>

    <rect class="soft" x="16" y="88" width="198" height="46" rx="10"/>
    <text class="body" x="30" y="109">利益/ROI</text>
    <text class="tiny" x="30" y="124">手数料・送料・梱包費込み</text>

    <rect class="soft" x="16" y="146" width="198" height="46" rx="10"/>
    <text class="body" x="30" y="167">需要/回転</text>
    <text class="tiny" x="30" y="182">ランキング・販売速度・季節性</text>

    <rect class="soft" x="16" y="204" width="198" height="46" rx="10"/>
    <text class="body" x="30" y="225">競合/リスク</text>
    <text class="tiny" x="30" y="240">Amazon本体・出品者増加</text>

    <rect class="apiMixed" x="16" y="262" width="198" height="54" rx="10"/>
    <text class="body" x="30" y="283">GPT-5.5</text>
    <text class="tiny" x="30" y="298">A/B/C判定・仕入れ数提案</text>
    <text class="tiny" x="30" y="311">API費用は利用量次第</text>

    <text class="tiny" x="18" y="360">AIは説明役。計算式は固定して再現性を担保。</text>
  </g>

  <g transform="translate(840 238)">
    <rect class="card" x="0" y="0" width="230" height="392" rx="16"/>
    <circle class="purple" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">4</text>
    <text class="section" x="54" y="39">仕入れ・在庫</text>
    <text class="small" x="18" y="66">在庫マスターを必ず持つ</text>

    <rect class="soft" x="16" y="88" width="198" height="42" rx="10"/>
    <text class="body" x="30" y="109">仕入れ記録</text>
    <text class="tiny" x="30" y="123">purchase_id / SKU / 原価</text>

    <rect class="soft" x="16" y="140" width="198" height="42" rx="10"/>
    <text class="body" x="30" y="161">入庫・検品</text>
    <text class="tiny" x="30" y="175">状態・付属品・写真</text>

    <rect class="apiMixed" x="16" y="192" width="198" height="48" rx="10"/>
    <text class="body" x="30" y="213">在庫マスター</text>
    <text class="tiny" x="30" y="228">自社DB + FBA在庫API</text>

    <rect class="soft" x="16" y="250" width="198" height="42" rx="10"/>
    <text class="body" x="30" y="271">滞留/損切り</text>
    <text class="tiny" x="30" y="285">30/60/90日でアラート</text>

    <rect class="risk" x="16" y="302" width="198" height="42" rx="10"/>
    <text class="body" x="30" y="323">古物台帳</text>
    <text class="tiny" x="30" y="337">中古仕入れ時は記録必須</text>
  </g>

  <g transform="translate(1094 238)">
    <rect class="card" x="0" y="0" width="230" height="392" rx="16"/>
    <circle class="orange" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">5</text>
    <text class="section" x="54" y="39">販売・発送</text>
    <text class="small" x="18" y="66">注文・配送・手数料を回収</text>

    <rect class="apiMixed" x="16" y="88" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="109">Amazon販売</text>
    <text class="tiny" x="30" y="124">Orders / FBA / Finances</text>

    <rect class="apiMixed" x="16" y="150" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="171">Yahoo/eBay販売</text>
    <text class="tiny" x="30" y="186">注文・在庫・発送API</text>

    <rect class="risk" x="16" y="212" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="233">メルカリ販売</text>
    <text class="tiny" x="30" y="248">自動出品/操作は規約注意</text>

    <rect class="soft" x="16" y="274" width="198" height="50" rx="10"/>
    <text class="body" x="30" y="295">配送・返品</text>
    <text class="tiny" x="30" y="310">送料・返品原価・再出品</text>

    <text class="tiny" x="18" y="360">販売後に在庫を減らし、実利益を確定。</text>
  </g>

  <g transform="translate(1348 238)">
    <rect class="card" x="0" y="0" width="174" height="392" rx="16"/>
    <circle class="green" cx="28" cy="32" r="16"/>
    <text class="num" x="24" y="37">6</text>
    <text class="section" x="54" y="39">会計</text>
    <text class="small" x="18" y="66">利益と税務準備</text>

    <rect class="apiMixed" x="16" y="88" width="142" height="50" rx="10"/>
    <text class="body" x="30" y="109">freee</text>
    <text class="tiny" x="30" y="124">個人1,780円/月〜</text>

    <rect class="soft" x="16" y="150" width="142" height="50" rx="10"/>
    <text class="body" x="30" y="171">会計CSV</text>
    <text class="tiny" x="30" y="186">汎用仕訳出力</text>

    <rect class="soft" x="16" y="212" width="142" height="50" rx="10"/>
    <text class="body" x="30" y="233">棚卸</text>
    <text class="tiny" x="30" y="248">期末在庫・原価</text>

    <rect class="soft" x="16" y="274" width="142" height="50" rx="10"/>
    <text class="body" x="30" y="295">証憑保存</text>
    <text class="tiny" x="30" y="310">領収書・請求書</text>
  </g>

  <path class="line" d="M308 434 L325 434" marker-end="url(#arrow)"/>
  <path class="line" d="M562 434 L579 434" marker-end="url(#arrow)"/>
  <path class="line" d="M816 434 L833 434" marker-end="url(#arrow)"/>
  <path class="line" d="M1070 434 L1087 434" marker-end="url(#arrow)"/>
  <path class="line" d="M1324 434 L1341 434" marker-end="url(#arrow)"/>

  <g transform="translate(78 666)">
    <rect x="0" y="0" width="1444" height="122" rx="18" fill="#f3f6fa" stroke="#dce2ea"/>
    <text class="section" x="24" y="38">追加で記載すべき管理項目</text>
    <text class="body" x="250" y="34">1. SKU/JAN/ASINの紐づけ</text>
    <text class="small" x="250" y="56">同一商品を販路別に追えるようにする</text>
    <text class="body" x="526" y="34">2. 在庫滞留アラート</text>
    <text class="small" x="526" y="56">30/60/90日で値下げ・損切り判断</text>
    <text class="body" x="778" y="34">3. 資金繰り</text>
    <text class="small" x="778" y="56">クレカ支払日・入金予定・回収日数</text>
    <text class="body" x="1002" y="34">4. コンプライアンス</text>
    <text class="small" x="1002" y="56">古物台帳・真贋・禁止商品・規約確認</text>
    <text class="body" x="250" y="92">5. 実績学習</text>
    <text class="small" x="352" y="92">売れた/売れない結果をAI判定へ戻し、仕入れルールを改善する。</text>
  </g>

  <text class="tiny" x="78" y="830">料金メモ：Amazon大口出品は4,900円/月+税。Keepa APIは€49/月〜を目安。楽天APIは公式ヘルプ上、全API無料。freeeは個人スターター月払い1,780円/月、年払い980円/月相当から。</text>
  <text class="tiny" x="78" y="848">注記：メルカリ等の自動取得・自動操作は規約リスクが高いため、初期版はCSV/手動補完を推奨。金額・条件は変更されるため導入時に公式確認。</text>
  <text class="tiny" x="1312" y="848">作成: Codex / 2026-05-24 / v3</text>
</svg>
