<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f6f7fa; }
      .paper { fill: #ffffff; stroke: #e6ebf1; stroke-width: 1.4; }
      .title { font: 700 37px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #162033; }
      .subtitle { font: 400 16.5px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #5d6878; }
      .section { font: 700 18px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #1b2536; }
      .body { font: 600 13.2px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #253146; }
      .small { font: 500 11px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #596579; }
      .tiny { font: 500 9.7px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #657184; }
      .card { fill: #ffffff; stroke: #dfe5ed; stroke-width: 1.25; }
      .soft { fill: #f0f4f8; stroke: #cbd5e1; }
      .apiFree { fill: #e8f5ef; stroke: #89c8ab; }
      .apiPaid { fill: #fff2df; stroke: #ddb16f; }
      .apiMixed { fill: #eef2ff; stroke: #9aa9e8; }
      .risk { fill: #fff1f2; stroke: #ef9aa7; }
      .db { fill: #eef6ff; stroke: #8bbce8; }
      .job { fill: #f7efff; stroke: #bba1e8; }
      .blue { fill: #2563eb; }
      .green { fill: #0f9f6e; }
      .orange { fill: #d97706; }
      .purple { fill: #7c3aed; }
      .dark { fill: #172033; }
      .line { stroke: #9aa7b8; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #8b6fc9; stroke-width: 2; fill: none; stroke-linecap: round; stroke-dasharray: 7 7; }
      .badgeText { font: 700 10px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #ffffff; }
      .tagText { font: 700 9.7px "Yu Gothic", "Meiryo", Arial, sans-serif; fill: #233044; }
      .num { font: 700 13px Arial, sans-serif; fill: #ffffff; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d283a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7b8"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b6fc9"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="paper" x="38" y="28" width="1524" height="842" rx="22" filter="url(#shadow)"/>
  <rect class="paper" x="38" y="28" width="1524" height="842" rx="22"/>

  <text x="74" y="80" class="title">せどりAIシステム統合概念図：業務フロー + 技術設計</text>
  <text x="76" y="113" class="subtitle">仕入れ先データ、Amazon/楽天/Yahoo API、在庫マスター、販売実績、会計連携をTypeScript + PostgreSQL + スケジューラーで統合管理する。</text>

  <g transform="translate(74 138)">
    <rect class="soft" x="0" y="0" width="1452" height="54" rx="15"/>
    <text class="section" x="20" y="34">技術方針</text>
    <rect class="blue" x="122" y="13" width="154" height="28" rx="14"/>
    <text class="badgeText" x="144" y="32">TypeScript / Node.js</text>
    <rect class="green" x="288" y="13" width="102" height="28" rx="14"/>
    <text class="badgeText" x="312" y="32">Next.js</text>
    <rect class="dark" x="402" y="13" width="116" height="28" rx="14"/>
    <text class="badgeText" x="429" y="32">Prisma</text>
    <rect class="purple" x="530" y="13" width="150" height="28" rx="14"/>
    <text class="badgeText" x="552" y="32">Redis + BullMQ</text>
    <text class="small" x="704" y="31">PythonはAI/分析が重くなった段階で追加。初期MVPはTypeScript中心で実装。</text>
    <text class="tiny" x="1178" y="31">料金は2026年5月時点目安</text>
  </g>

  <g transform="translate(74 220)">
    <rect class="card" x="0" y="0" width="224" height="304" rx="15"/>
    <circle class="blue" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">1</text>
    <text class="section" x="49" y="35">仕入れ先</text>
    <text class="small" x="16" y="60">候補商品と仕入価格を集める</text>
    <rect class="apiFree" x="14" y="78" width="196" height="32" rx="9"/>
    <text class="body" x="28" y="99">楽天市場</text><text class="tiny" x="139" y="99">API 0円/月</text>
    <rect class="apiFree" x="14" y="118" width="196" height="32" rx="9"/>
    <text class="body" x="28" y="139">Yahoo!ショッピング</text><text class="tiny" x="139" y="139">API 0円/月</text>
    <rect class="apiMixed" x="14" y="158" width="196" height="38" rx="9"/>
    <text class="body" x="28" y="179">Amazon.co.jp</text><text class="tiny" x="28" y="192">SP-API: 大口4,900円/月+税</text>
    <rect class="risk" x="14" y="204" width="196" height="38" rx="9"/>
    <text class="body" x="28" y="225">メルカリ / ヤフオク</text><text class="tiny" x="28" y="238">CSV/手動推奨・規約注意</text>
    <rect class="soft" x="14" y="250" width="196" height="32" rx="9"/>
    <text class="body" x="28" y="271">店舗/JAN/OCR</text>
  </g>

  <g transform="translate(322 220)">
    <rect class="card" x="0" y="0" width="224" height="304" rx="15"/>
    <circle class="blue" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">2</text>
    <text class="section" x="49" y="35">市場・相場</text>
    <text class="small" x="16" y="60">売れ行き・競合・価格履歴</text>
    <rect class="apiPaid" x="14" y="78" width="196" height="44" rx="9"/>
    <text class="body" x="28" y="99">Keepa API</text><text class="tiny" x="28" y="115">€49/月〜 約9,000円〜</text>
    <rect class="apiMixed" x="14" y="132" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="153">Amazon SP-API</text><text class="tiny" x="28" y="168">価格・競合オファー・注文</text>
    <rect class="apiFree" x="14" y="184" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="205">楽天/Yahoo API</text><text class="tiny" x="28" y="220">価格・送料・在庫有無</text>
    <rect class="soft" x="14" y="236" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="257">手動/CSV補完</text><text class="tiny" x="28" y="272">APIが弱い相場情報</text>
  </g>

  <g transform="translate(570 220)">
    <rect class="card" x="0" y="0" width="224" height="304" rx="15"/>
    <circle class="green" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">3</text>
    <text class="section" x="49" y="35">AI仕入れ判定</text>
    <text class="small" x="16" y="60">利益・需要・リスクを点数化</text>
    <rect class="soft" x="14" y="78" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="100">利益/ROI/損益分岐</text>
    <rect class="soft" x="14" y="124" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="146">需要/回転/季節性</text>
    <rect class="soft" x="14" y="170" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="192">価格下落/競合リスク</text>
    <rect class="apiMixed" x="14" y="216" width="196" height="48" rx="9"/>
    <text class="body" x="28" y="237">GPT-5.5</text><text class="tiny" x="28" y="253">A/B/C判定・仕入数・理由</text>
    <text class="tiny" x="16" y="286">計算式は固定、説明をAI化。</text>
  </g>

  <g transform="translate(818 220)">
    <rect class="card" x="0" y="0" width="224" height="304" rx="15"/>
    <circle class="purple" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">4</text>
    <text class="section" x="49" y="35">仕入れ・在庫</text>
    <text class="small" x="16" y="60">在庫マスターを正本にする</text>
    <rect class="db" x="14" y="78" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="100">inventory_items</text>
    <rect class="soft" x="14" y="124" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="146">入庫・検品・写真</text>
    <rect class="soft" x="14" y="170" width="196" height="36" rx="9"/>
    <text class="body" x="28" y="192">出品中・販売済・返品</text>
    <rect class="risk" x="14" y="216" width="196" height="48" rx="9"/>
    <text class="body" x="28" y="237">滞留/棚卸/古物台帳</text><text class="tiny" x="28" y="253">30/60/90日アラート</text>
    <text class="tiny" x="16" y="286">SKU/JAN/ASINを紐づけ。</text>
  </g>

  <g transform="translate(1066 220)">
    <rect class="card" x="0" y="0" width="224" height="304" rx="15"/>
    <circle class="orange" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">5</text>
    <text class="section" x="49" y="35">販売・発送</text>
    <text class="small" x="16" y="60">注文・入金・手数料を回収</text>
    <rect class="apiMixed" x="14" y="78" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="99">Amazon販売</text><text class="tiny" x="28" y="114">Orders / FBA / Finances</text>
    <rect class="apiMixed" x="14" y="130" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="151">Yahoo/eBay販売</text><text class="tiny" x="28" y="166">注文・在庫・発送API</text>
    <rect class="risk" x="14" y="182" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="203">メルカリ販売</text><text class="tiny" x="28" y="218">自動操作は規約注意</text>
    <rect class="soft" x="14" y="234" width="196" height="42" rx="9"/>
    <text class="body" x="28" y="255">返品・再出品・損切り</text>
  </g>

  <g transform="translate(1314 220)">
    <rect class="card" x="0" y="0" width="212" height="304" rx="15"/>
    <circle class="green" cx="25" cy="29" r="15"/><text class="num" x="21" y="34">6</text>
    <text class="section" x="49" y="35">会計・レポート</text>
    <text class="small" x="16" y="60">利益確定・税務準備</text>
    <rect class="apiMixed" x="14" y="78" width="184" height="42" rx="9"/>
    <text class="body" x="28" y="99">freee API / CSV</text><text class="tiny" x="28" y="114">1,780円/月〜</text>
    <rect class="db" x="14" y="130" width="184" height="42" rx="9"/>
    <text class="body" x="28" y="151">accounting_entries</text><text class="tiny" x="28" y="166">売上/原価/送料/手数料</text>
    <rect class="soft" x="14" y="182" width="184" height="42" rx="9"/>
    <text class="body" x="28" y="203">棚卸・証憑保存</text><text class="tiny" x="28" y="218">領収書/OCR/請求書</text>
    <rect class="soft" x="14" y="234" width="184" height="42" rx="9"/>
    <text class="body" x="28" y="255">月次AIレポート</text>
  </g>

  <path class="line" d="M298 372 L315 372" marker-end="url(#arrow)"/>
  <path class="line" d="M546 372 L563 372" marker-end="url(#arrow)"/>
  <path class="line" d="M794 372 L811 372" marker-end="url(#arrow)"/>
  <path class="line" d="M1042 372 L1059 372" marker-end="url(#arrow)"/>
  <path class="line" d="M1290 372 L1307 372" marker-end="url(#arrow)"/>

  <g transform="translate(74 554)">
    <rect class="job" x="0" y="0" width="1452" height="92" rx="16"/>
    <text class="section" x="20" y="34">スケジューラー / バッチ起動</text>
    <text class="body" x="244" y="29">BullMQ + Redis</text>
    <text class="small" x="244" y="50">cronでジョブ投入、workerがAPI制限・リトライ・失敗履歴を管理</text>
    <text class="body" x="602" y="29">毎時</text>
    <text class="small" x="650" y="29">価格/在庫/Keepa候補更新</text>
    <text class="body" x="602" y="57">毎日</text>
    <text class="small" x="650" y="57">注文同期・滞留アラート・AI候補レポート</text>
    <text class="body" x="1010" y="29">週次/月次</text>
    <text class="small" x="1098" y="29">棚卸・資金繰り・会計CSV/freee連携・実績学習</text>
    <rect class="purple" x="1288" y="48" width="120" height="26" rx="13"/>
    <text class="badgeText" x="1310" y="66">jobs / job_runs</text>
  </g>

  <path class="dash" d="M1348 554 C1348 530, 930 530, 930 524" marker-end="url(#arrowPurple)"/>
  <path class="dash" d="M1348 554 C1348 530, 434 530, 434 524" marker-end="url(#arrowPurple)"/>
  <path class="dash" d="M1348 646 C1348 674, 860 674, 860 682" marker-end="url(#arrowPurple)"/>

  <g transform="translate(74 676)">
    <rect class="db" x="0" y="0" width="1452" height="112" rx="16"/>
    <text class="section" x="20" y="35">データベース設計 PostgreSQL</text>
    <text class="body" x="250" y="30">商品/相場</text>
    <text class="small" x="250" y="51">products / product_identifiers / market_prices / sourcing_candidates / ai_scores</text>
    <text class="body" x="250" y="82">仕入れ/在庫</text>
    <text class="small" x="350" y="82">purchase_orders / inventory_items / inventory_movements / suppliers</text>
    <text class="body" x="828" y="30">販売/会計</text>
    <text class="small" x="828" y="51">listings / orders / order_items / fees / shipments / returns / accounting_entries</text>
    <text class="body" x="828" y="82">運用</text>
    <text class="small" x="884" y="82">receipts / channels / alerts / jobs / job_runs / api_credentials / audit_logs</text>
  </g>

  <g transform="translate(74 810)">
    <rect x="0" y="0" width="1452" height="32" rx="16" fill="#f3f6fa" stroke="#dce2ea"/>
    <text class="tiny" x="18" y="21">重要管理項目：SKU/JAN/ASIN紐づけ、在庫滞留アラート、資金繰り、棚卸、古物台帳、真贋/禁止商品チェック、実績学習。</text>
    <text class="tiny" x="1192" y="21">作成: Codex / 2026-05-24 / v5</text>
  </g>
</svg>
