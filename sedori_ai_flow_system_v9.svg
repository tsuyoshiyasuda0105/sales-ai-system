  <g transform="translate(92 732)">
    <rect class="secure" x="0" y="0" width="536" height="126" rx="18"/>
    <text class="section" x="26" y="36">マルチテナント / セキュリティ</text>
    <text class="body" x="26" y="68">organization_idで全データを分離</text>
    <text class="small" x="26" y="94">APIキーは暗号化し、RLSと監査ログで保護</text>
  </g>

  <g transform="translate(662 732)">
    <rect class="job" x="0" y="0" width="536" height="126" rx="18"/>
    <text class="section" x="26" y="36">スケジューラー / タスク管理</text>
    <text class="body" x="26" y="68">BullMQ + Redisで価格・在庫を定期同期</text>
    <text class="small" x="26" y="94">差分検知、滞留チェック、日次AIレポートを実行</text>
  </g>

  <g transform="translate(1232 732)">
    <rect class="keepa" x="0" y="0" width="596" height="126" rx="18"/>
    <text class="section" x="26" y="36">差別化ポイント</text>
    <text class="body" x="26" y="68">日本版 Tactical Arbitrage + SellerAmp + 在庫/会計管理</text>
    <text class="small" x="26" y="94">仕入れ判断だけで終わらせず、販売後の利益確定まで追跡</text>
  </g>

  <g transform="translate(92 884)">
    <rect class="db" x="0" y="0" width="1736" height="86" rx="18"/>
    <text class="section" x="26" y="36">データベース設計 PostgreSQL</text>
    <text class="small" x="330" y="31">認証/組織: users, organizations, organization_members, api_credentials, sessions</text>
    <text class="small" x="330" y="57">商品/市場: products, product_identifiers, market_prices, sourcing_candidates, ai_scores</text>
    <text class="small" x="940" y="31">横断比較: channel_product_matches, cross_channel_opportunities</text>
    <text class="small" x="940" y="57">在庫/会計: purchase_orders, inventory_items, inventory_movements, orders, fees, accounting_entries</text>
  </g>

  <g transform="translate(92 1000)">
    <rect x="0" y="0" width="1736" height="44" rx="18" fill="#f3f6fa" stroke="#dce2ea"/>
